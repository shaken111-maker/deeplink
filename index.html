<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    // Runs before body renders — fastest possible redirect
    (function () {
      var params = new URLSearchParams(window.location.search);
      var dest = params.get('to');
      if (!dest) return;
      if (!/^https?:\/\//i.test(dest)) dest = 'https://' + dest;

      var ua = navigator.userAgent || '';
      var isAndroid  = /Android/i.test(ua);
      var isInApp    = /Instagram|FBAN|FBAV|musical_ly|TikTok/i.test(ua);

      if (isInApp && isAndroid) {
        // Force Chrome via intent URI
        window.location.replace(
          'intent://' + dest.replace(/^https?:\/\//i, '') +
          '#Intent;scheme=https;package=com.android.chrome;end'
        );
      } else {
        window.location.replace(dest);
      }
    })();
  </script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; background: #f5f5f5;
    }
    .box {
      text-align: center; padding: 40px 30px; background: #fff;
      border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08);
      max-width: 320px; width: 90%;
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #e0e0e0;
      border-top-color: #333; border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { margin: 0 0 6px; font-size: 17px; color: #111; }
    p  { margin: 0 0 18px; font-size: 13px; color: #666; }
    a.btn {
      display: none; padding: 11px 26px; background: #111;
      color: #fff; text-decoration: none; border-radius: 8px;
      font-size: 13px; font-weight: 600;
    }
  </style>
</head>
<body>
<div class="box">
  <div class="spinner" id="sp"></div>
  <h2 id="title">Redirecting…</h2>
  <p id="msg">Opening link</p>
  <a class="btn" id="btn" href="#">Open manually →</a>
</div>
<script>
  // Fallback UI — only shown if redirect didn't fire (iOS in-app browser)
  (function () {
    var params = new URLSearchParams(window.location.search);
    var dest = params.get('to');
    if (!dest) {
      document.getElementById('title').textContent = 'No destination';
      document.getElementById('msg').textContent   = 'Add ?to=YOUR_URL to this link.';
      document.getElementById('sp').style.display  = 'none';
      return;
    }
    if (!/^https?:\/\//i.test(dest)) dest = 'https://' + dest;

    var btn = document.getElementById('btn');
    btn.href = dest;

    // Show manual button after 1.2 s (redirect already fired or failed)
    setTimeout(function () {
      document.getElementById('sp').style.display   = 'none';
      document.getElementById('msg').textContent    = 'Tap below if not redirected:';
      btn.style.display = 'inline-block';
      btn.textContent   = 'Open link →';
    }, 1200);
  })();
</script>
</body>
</html>
